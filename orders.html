<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lake Country Meats – Order Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #8B1A1A;
    --crimson-dark: #5C0E0E;
    --crimson-light: #B22222;
    --gold: #C9953A;
    --gold-light: #E8B96A;
    --cream: #FAF6EE;
    --charcoal: #1A1A1A;
    --smoke: #2E2E2E;
    --border: rgba(201,149,58,0.25);
    --green: #2E7D52;
    --green-light: #4CAF80;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* TOP NAV */
  .topbar {
    background: linear-gradient(90deg, var(--crimson-dark), #1a0a0a);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-left img {
    height: 52px;
    width: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    line-height: 1.1;
  }

  .topbar-title small {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(250,246,238,0.45);
    font-style: normal;
  }

  .back-link {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 7px 16px;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .back-link:hover { background: rgba(201,149,58,0.1); }

  /* CONTENT */
  .content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px;
  }

  /* STAT CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: var(--smoke);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
  }

  .stat-card .s-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(250,246,238,0.45);
    margin-bottom: 8px;
  }

  .stat-card .s-val {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold-light);
    font-weight: 700;
    line-height: 1;
  }

  .stat-card .s-sub {
    font-size: 0.78rem;
    color: rgba(250,246,238,0.4);
    margin-top: 4px;
  }

  /* TABLE SECTION */
  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .table-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--cream);
  }

  .filter-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: rgba(250,246,238,0.6);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(201,149,58,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* TABLE */
  .table-wrap {
    background: var(--smoke);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  thead tr {
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
  }

  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 14px 18px;
    text-align: left;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  tbody td {
    padding: 14px 18px;
    font-size: 0.9rem;
    color: rgba(250,246,238,0.8);
    white-space: nowrap;
  }

  .order-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--gold-light);
    font-weight: 700;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .badge-paid {
    background: rgba(46,125,82,0.2);
    color: var(--green-light);
    border: 1px solid rgba(76,175,128,0.3);
  }

  .badge-pending {
    background: rgba(201,149,58,0.15);
    color: var(--gold-light);
    border: 1px solid var(--border);
  }

  .badge-6oz {
    background: rgba(139,26,26,0.2);
    color: #e88;
    border: 1px solid rgba(139,26,26,0.3);
  }

  .badge-8oz {
    background: rgba(92,14,14,0.3);
    color: #ffaaaa;
    border: 1px solid rgba(139,26,26,0.4);
  }

  .total-cell {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light) !important;
    font-size: 1rem !important;
  }

  /* EXPORT BTN */
  .export-btn {
    background: var(--crimson);
    color: var(--cream);
    border: none;
    border-radius: 7px;
    padding: 9px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .export-btn:hover { background: var(--crimson-light); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: rgba(250,246,238,0.35);
    font-size: 0.9rem;
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="logo.png" alt="Lake Country Meats">
    <div class="topbar-title">
      Order Management
      <small>Tip Sirloin Flash Sale</small>
    </div>
  </div>
  <a href="index.html" class="back-link">← Back to Store</a>
</div>

<div class="content">

  <!-- STATS -->
  <div class="stat-grid" id="stat-grid">
    <!-- populated by JS -->
  </div>

  <!-- TABLE -->
  <div class="table-header">
    <h2>Paid Orders</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterOrders('all',this)">All</button>
        <button class="filter-btn" onclick="filterOrders('6 oz',this)">6 oz</button>
        <button class="filter-btn" onclick="filterOrders('8 oz',this)">8 oz</button>
      </div>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="orders-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Date / Time</th>
          <th>Customer</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Size</th>
          <th>Qty (Boxes)</th>
          <th>Total</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="orders-body">
      </tbody>
    </table>
  </div>

</div>

<script>
  // ── SAMPLE ORDERS ──
  const sampleOrders = [
    { id:'LCM-10001', date:'4/23/2025, 8:02 AM',  name:'Mike Anderson',    email:'manderson@email.com',    phone:'(320) 555-0101', size:'8 oz', qty:2, total:'156.00', status:'Paid' },
    { id:'LCM-10002', date:'4/23/2025, 8:17 AM',  name:'Sarah Johnson',    email:'sarah.j@gmail.com',      phone:'(320) 555-0114', size:'6 oz', qty:3, total:'234.00', status:'Paid' },
    { id:'LCM-10003', date:'4/23/2025, 8:34 AM',  name:'Tom Reinhardt',    email:'tomr@outlook.com',       phone:'(320) 555-0198', size:'8 oz', qty:1, total:'78.00',  status:'Paid' },
    { id:'LCM-10004', date:'4/23/2025, 8:51 AM',  name:'Linda Pearson',    email:'lindap@hotmail.com',     phone:'(218) 555-0044', size:'6 oz', qty:4, total:'312.00', status:'Paid' },
    { id:'LCM-10005', date:'4/23/2025, 9:10 AM',  name:'Dave Christensen', email:'davec@yahoo.com',        phone:'(320) 555-0772', size:'8 oz', qty:2, total:'156.00', status:'Paid' },
    { id:'LCM-10006', date:'4/23/2025, 9:28 AM',  name:'Karen Olson',      email:'kolson@gmail.com',       phone:'(320) 555-0310', size:'6 oz', qty:1, total:'78.00',  status:'Paid' },
    { id:'LCM-10007', date:'4/23/2025, 9:45 AM',  name:'Brian Hanson',     email:'bhanson@icloud.com',     phone:'(612) 555-0087', size:'8 oz', qty:5, total:'390.00', status:'Paid' },
    { id:'LCM-10008', date:'4/23/2025, 10:03 AM', name:'Jessica Norby',    email:'jnorby@email.com',       phone:'(320) 555-0456', size:'6 oz', qty:2, total:'156.00', status:'Paid' },
    { id:'LCM-10009', date:'4/23/2025, 10:19 AM', name:'Ryan Bjornstad',   email:'ryan.b@gmail.com',       phone:'(218) 555-0099', size:'8 oz', qty:3, total:'234.00', status:'Paid' },
    { id:'LCM-10010', date:'4/23/2025, 10:37 AM', name:'Amy Gustafson',    email:'agustafson@yahoo.com',   phone:'(320) 555-0603', size:'6 oz', qty:2, total:'156.00', status:'Paid' },
    { id:'LCM-10011', date:'4/23/2025, 10:55 AM', name:'Craig Thomsen',    email:'cthamsen@outlook.com',   phone:'(320) 555-0721', size:'8 oz', qty:4, total:'312.00', status:'Paid' },
    { id:'LCM-10012', date:'4/23/2025, 11:08 AM', name:'Debbie Larson',    email:'dlarson@gmail.com',      phone:'(320) 555-0833', size:'6 oz', qty:1, total:'78.00',  status:'Paid' },
  ];

  // Merge with any real orders from localStorage
  function getAllOrders() {
    const live = JSON.parse(localStorage.getItem('lcm_orders') || '[]');
    return [...live, ...sampleOrders];
  }

  let currentFilter = 'all';

  function renderStats(orders) {
    const totalBoxes = orders.reduce((s, o) => s + Number(o.qty), 0);
    const totalRevenue = orders.reduce((s, o) => s + Number(o.total), 0);
    const boxes6 = orders.filter(o => o.size === '6 oz').reduce((s, o) => s + Number(o.qty), 0);
    const boxes8 = orders.filter(o => o.size === '8 oz').reduce((s, o) => s + Number(o.qty), 0);

    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card">
        <div class="s-label">Total Orders</div>
        <div class="s-val">${orders.length}</div>
        <div class="s-sub">paid transactions</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Boxes Sold</div>
        <div class="s-val">${totalBoxes}</div>
        <div class="s-sub">5 lb boxes</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Revenue</div>
        <div class="s-val">$${totalRevenue.toLocaleString()}</div>
        <div class="s-sub">at $78 / box</div>
      </div>
      <div class="stat-card">
        <div class="s-label">6 oz Boxes Sold</div>
        <div class="s-val">${boxes6}</div>
        <div class="s-sub">of 210 available</div>
      </div>
      <div class="stat-card">
        <div class="s-label">8 oz Boxes Sold</div>
        <div class="s-val">${boxes8}</div>
        <div class="s-sub">of 190 available</div>
      </div>
    `;
  }

  function renderTable(orders) {
    const tbody = document.getElementById('orders-body');
    const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.size === currentFilter);

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="icon">📋</div>No orders yet.</div></td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(o => `
      <tr>
        <td><span class="order-id">${o.id}</span></td>
        <td>${o.date}</td>
        <td>${o.name}</td>
        <td>${o.email}</td>
        <td>${o.phone}</td>
        <td><span class="badge ${o.size === '6 oz' ? 'badge-6oz' : 'badge-8oz'}">${o.size}</span></td>
        <td style="text-align:center">${o.qty}</td>
        <td class="total-cell">$${Number(o.total).toLocaleString('en-US', {minimumFractionDigits:2})}</td>
        <td><span class="badge badge-paid">${o.status}</span></td>
      </tr>
    `).join('');
  }

  function filterOrders(size, btn) {
    currentFilter = size;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(getAllOrders());
  }

  function exportCSV() {
    const orders = getAllOrders();
    const headers = ['Order ID','Date','Name','Email','Phone','Size','Qty','Total','Status'];
    const rows = orders.map(o => [o.id, o.date, o.name, o.email, o.phone, o.size, o.qty, o.total, o.status]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'lcm_orders.csv';
    a.click();
  }

  // Init
  const all = getAllOrders();
  renderStats(all);
  renderTable(all);
</script>
</body>
</html>
